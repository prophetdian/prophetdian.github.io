[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22.13.0"
  PNPM_VERSION = "10.4.1"
  VITE_SUPABASE_URL = "https://rqlucgdeuvpkkrbnvjex.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_fLoSYy-c_Q76RxL3nlfb4A_2hcweUta"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"


